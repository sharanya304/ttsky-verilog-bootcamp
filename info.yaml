# Tiny Tapeout project information
project:
  title:        "test_pattern_gen"      # Project title
  author:       "sharanya"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Test Pattern Generator that outputs predefined digital sequences for verification and debugging."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_test_pattern_gen"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).

pinout:
 
  ui[0]: "mode[0] - Pattern select bit 0"
  ui[1]: "mode[1] - Pattern select bit 1"
  ui[2]: "hold    - Freeze output when high"
  ui[3]: "srst    - Synchronous reset (active high)"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  uo[0]: "pattern[0] - Output bit 0 (LSB)"
  uo[1]: "pattern[1] - Output bit 1"
  uo[2]: "pattern[2] - Output bit 2"
  uo[3]: "pattern[3] - Output bit 3"
  uo[4]: "pattern[4] - Output bit 4"
  uo[5]: "pattern[5] - Output bit 5"
  uo[6]: "pattern[6] - Output bit 6"
  uo[7]: "pattern[7] - Output bit 7 (MSB)"

  uio[0]: "done       - Pattern cycle complete pulse"
  uio[1]: "pattern[4] - Mirror of output bit 4"
  uio[2]: "pattern[5] - Mirror of output bit 5"
  uio[3]: "pattern[6] - Mirror of output bit 6"
  uio[4]: "pattern[7] - Mirror of output bit 7"
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""



# Do not change!
yaml_version: 6
